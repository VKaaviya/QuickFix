
{% extends "templates/web.html" %}
{% block page_content %}

<h3>Track Your Job</h3>

<form method="get">
    <input type="text" name="job_id" placeholder="Enter Job ID">
    <button type="submit">Track</button>
</form>

{% if jobs %}
    <h4>Job Details</h4>
    <p>Status: {{ jobs[0].status }}</p>
    <p>Customer: {{ jobs[0].customer_name }}</p>
    <p>Assigned Technician: {{ jobs[0].assigned_technician }}</p>
{% endif %}

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

{% endblock %}
